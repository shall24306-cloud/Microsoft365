<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Center Demo</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#e6e6e6;
}

/* TOP BLUE BAR */
.top-alert{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  background:#0078D7;
  color:white;
  padding:15px;
  border-radius:6px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* MAIN POPUP */
.popup{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  width:500px;
  background:white;
  border-radius:6px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  overflow:hidden;
}

/* HEADER */
.header{
  padding:10px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

.header img{
  width:25px;
}

.header span{
  font-weight:bold;
}

/* CONTENT */
.content{
  padding:20px;
  text-align:center;
}

.red{
  color:red;
  font-weight:bold;
  margin:10px 0;
}

.icons{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:15px 0;
}

.icons div{
  width:70px;
  height:70px;
  background:#f0f0f0;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
}

button{
  padding:8px 25px;
  border:none;
  border-radius:4px;
  font-weight:bold;
  cursor:pointer;
}

.allow{
  background:#0078D7;
  color:white;
}

.deny{
  background:#ccc;
}

/* BLINK EFFECT */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,0,0,0.15);
  display:none;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<div class="top-alert">
⚠ Windows Security Warning (Demo)<br>
Access to this PC has been blocked for security reasons
</div>

<div class="overlay" id="overlay"></div>

<div class="popup">

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">
<span>Windows Defender Security Center</span>
</div>

<div class="content">

<div class="red">
Threat Detected: Suspicious Activity
</div>

<div class="icons">
<div>🛡️</div>
<div>⚠️</div>
<div>👤</div>
</div>

<p>
Access to this PC has been restricted.<br>
This is a demo UI for learning purposes.
</p>

<div class="buttons">
<button class="deny" onclick="startDemo()">Deny</button>
<button class="allow" onclick="startDemo()">Allow</button>
</div>

</div>
</div>

<audio id="sound" loop>
<source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>
function startDemo(){
  let sound=document.getElementById("sound");

  sound.currentTime=0;
  sound.play().catch(()=>{});

  document.getElementById("overlay").style.display="block";

  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}
</script>

</body>
</html>
