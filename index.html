<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Center Demo</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#0a0a0a;
}

/* BACKGROUND BLUR */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1518770660439-4636190af475") no-repeat center/cover;
  filter:blur(6px) brightness(0.5);
}

/* FAKE WINDOW */
.window{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:500px;
  background:#fff;
  border-radius:6px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  overflow:hidden;
}

/* TITLE BAR */
.titlebar{
  background:#f3f3f3;
  padding:10px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

/* CONTENT */
.content{
  padding:20px;
  text-align:center;
}

.content h2{
  color:#d32f2f;
  margin:10px 0;
}

.warning{
  color:red;
  font-weight:bold;
  margin:10px 0;
}

/* ICONS */
.icons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:15px 0;
}

.icons div{
  width:60px;
  height:60px;
  background:#eee;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:4px;
  margin:5px;
  font-weight:bold;
  cursor:pointer;
}

.allow{
  background:#0078D7;
  color:white;
}

.deny{
  background:#ccc;
}

/* TOP BLUE WARNING */
.top-alert{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  width:400px;
  background:#0078D7;
  color:white;
  padding:15px;
  border-radius:6px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* BLINK */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,0,0,0.2);
  animation:blink 1s infinite;
  display:none;
}

@keyframes blink{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay" id="overlay"></div>

<div class="top-alert">
⚠ Security Warning (Demo)<br>
Unusual activity detected on this system
</div>

<div class="window">

<div class="titlebar">
<span>Security Center</span>
<span>✖</span>
</div>

<div class="content">

<h2>Security Alert</h2>

<div class="warning">
Potential threat detected
</div>

<div class="icons">
<div>🛡️</div>
<div>⚠️</div>
<div>👤</div>
</div>

<p>This is a demo interface for learning UI design.</p>

<div class="buttons">
<button class="allow" onclick="startDemo()">Allow</button>
<button class="deny" onclick="startDemo()">Deny</button>
</div>

</div>
</div>

<audio id="sound" loop>
<source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>
function startDemo(){
  document.getElementById("overlay").style.display="block";

  document.getElementById("sound").play().catch(()=>{});

  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}
</script>

</body>
</html>
