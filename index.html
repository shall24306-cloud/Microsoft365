<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Virus Activity Simulation</title>
<style>
  body {
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:#0078D7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }

  .container {
    position:relative;
    width:750px;
    max-width:95%;
  }

  /* Background rectangular box */
  .bg-rect {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#f0f0f0;
    border-radius:8px;
    z-index:0;
  }

  .content {
    position:relative;
    background:white;
    border-radius:8px;
    padding:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    z-index:1;
  }

  .header {
    display:flex;
    align-items:center;
    gap:10px;
  }

  .header img {
    width:40px;
  }

  .title {
    font-weight:bold;
    font-size:20px;
  }

  .warning {
    margin-top:15px;
    padding:20px;
    background:white;
    border-left:5px solid red;
    text-align:center;
    font-weight:bold;
    font-size:16px;
  }

  .progress {
    margin-top:15px;
    height:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
  }

  .bar {
    height:100%;
    width:0%;
    background:#0078D7;
    animation: load 8s linear forwards;
  }

  @keyframes load {
    from {width:0%;}
    to {width:100%;}
  }

  /* Virus info boxes */
  .virus-grid {
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:15px;
  }

  .virus-box {
    background:#e6f0fb;
    padding:15px;
    border-radius:5px;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .virus-box img {
    width:40px;
    height:40px;
    border-radius:4px;
  }

  .buttons-box {
    margin-top:15px;
    background:#f0f0f0;
    padding:10px;
    border-radius:6px;
    display:flex;
    justify-content:center;
    gap:10px;
  }

  .buttons-box button {
    padding:8px 20px;
    font-weight:bold;
    border:none;
    border-radius:4px;
    cursor:pointer;
  }

  .allow { background:#0078D7; color:white; }
  .deny { background:#d32f2f; color:white; }

  .sys-msgs {
    margin-top:15px;
    background:#f9f9f9;
    padding:10px;
    height:120px;
    overflow-y:auto;
    font-size:13px;
    font-family:monospace;
    border-radius:5px;
    border:1px solid #ddd;
  }

  .sys-msg { margin:2px 0; }
</style>
</head>
<body>

<div class="container">

  <!-- Background rectangular box -->
  <div class="bg-rect"></div>

  <div class="content">

    <div class="header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">
      <div class="title">Windows Defender Security Center</div>
    </div>

    <div class="warning">
      Suspicious activity detected on this system.<br>
      Error Code: <span id="code">0xc3219</span>
    </div>

    <div class="progress">
      <div class="bar"></div>
    </div>

    <!-- Virus activity boxes -->
    <div class="virus-grid">
      <div class="virus-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Computer_virus_icon.png/64px-Computer_virus_icon.png" alt="virus">
        File <b>secret_data.docx</b> is being transmitted to <b>192.168.1.100</b>
      </div>
      <div class="virus-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Computer_virus_icon.png/64px-Computer_virus_icon.png" alt="virus">
        Malware type: <b>Trojan.Generic</b> detected in C:\Windows\System32
      </div>
      <div class="virus-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Computer_virus_icon.png/64px-Computer_virus_icon.png" alt="virus">
        Uploading infected files to remote server...
      </div>
    </div>

    <div class="buttons-box">
      <button class="allow" onclick="triggerFullscreen()">Allow</button>
      <button class="deny" onclick="triggerFullscreen()">Deny</button>
    </div>

    <div class="sys-msgs" id="sysMsgs"></div>

  </div>

</div>

<!-- Audio -->
<audio id="alertSound" loop>
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
  const sound = document.getElementById("alertSound");

  function triggerFullscreen() {
    sound.play().catch(()=>{});
    const elem = document.documentElement;
    if (elem.requestFullscreen) { elem.requestFullscreen(); }
    else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
    else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
  }

  document.getElementById("code").innerText = "0x" + Math.floor(Math.random()*999999).toString(16);

  // Fake system messages
  const sysMsgs = document.getElementById("sysMsgs");
  const messages = [
    "[INFO] Monitoring network connections...",
    "[ALERT] File secret_data.docx sent to 192.168.1.100",
    "[INFO] Trojan.Generic detected in system32",
    "[INFO] Active processes are being scanned...",
    "[ALERT] Malware activity ongoing",
    "[INFO] Attempting to block malicious process...",
    "[INFO] System scan in progress..."
  ];

  let i=0;
  function addMessage() {
    const msg = document.createElement("div");
    msg.className="sys-msg";
    msg.textContent = messages[i % messages.length];
    sysMsgs.appendChild(msg);
    sysMsgs.scrollTop = sysMsgs.scrollHeight;
    i++;
  }
  setInterval(addMessage, 1500);
</script>

</body>
</html>
