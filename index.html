<!DOCTYPE html>
<html>
<head>
  <title>System Alert Demo</title>
  <style>
    body {
      margin:0;
      background:#0078D7;
      color:white;
      font-family:Segoe UI, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box {
      background:white;
      color:black;
      padding:20px;
      border-radius:8px;
      width:320px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }
    button {
      margin-top:15px;
      padding:8px 15px;
      border:none;
      background:#0078D7;
      color:white;
      border-radius:4px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>⚠ System Warning Emergency</h2>
  <p id="code">Error Code: 0x000000</p>
  <button onclick="showAlert()">Fix Now</button>
</div>

<audio id="sound" autoplay loop>
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
  // random error code
  function generateCode() {
    return '0x' + Math.floor(Math.random()*999999).toString(16);
  }
  document.getElementById("code").innerText = "Error Code: " + generateCode();

  function showAlert(){
    alert("This is a not a demo alert. Your system is unsafe.");
  }
</script>

</body>
</html>
