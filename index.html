<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Alert Simulator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    text-align: center;
    margin-top: 100px;
  }
  .box {
    display: inline-block;
    padding: 20px;
    border: 2px solid red;
    background-color: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    max-width: 300px;
  }
  .title {
    color: red;
    font-size: 20px;
    font-weight: bold;
  }
  button {
    margin: 5px;
    padding: 10px 20px;
  }
  #scan {
    margin-top: 10px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="box">
  <div class="title">⚠️ Demo Alert</div>
  <p id="message">This is a safe educational alert simulation.</p>
  <button id="okBtn">OK</button>
  <button id="fullscreenBtn">Go Fullscreen</button>
  <button id="soundBtn">Play Sound</button>
  <div id="scan">Scanning...</div>
</div>

<!-- Optional: safe beep sound -->
<audio id="sound">
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
// OK Button hides the box
document.getElementById('okBtn').addEventListener('click', () => {
  document.querySelector('.box').style.display = 'none';
});

// Fullscreen (requires user click)
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }
});

// Play sound (requires user click)
document.getElementById('soundBtn').addEventListener('click', () => {
  document.getElementById('sound').play();
});

// Safe scanning animation
let dots = 0;
setInterval(() => {
  dots = (dots + 1) % 4;
  document.getElementById('scan').innerText = "Scanning" + ".".repeat(dots);
}, 500);
</script>

</body>
</html>

<audio id="sound" loop>
<source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>
function startDemo(){
  let sound=document.getElementById("sound");

  sound.currentTime=0;
  sound.play().catch(()=>{});

  document.getElementById("overlay").style.display="block";

  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}
</script>

</body>
</html>
